---
default_stages: [pre-commit, pre-push]
minimum_prek_version: "0.2.13"
# package-lock.json is generated and large; never lint it.
exclude: ^package-lock\.json$
repos:
  - repo: meta
    hooks:
      # check-hooks-apply is intentionally omitted: we keep forward-looking
      # hooks (e.g. check-toml) that match no files in the repo yet.
      - id: check-useless-excludes
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
      - id: zizmor
        name: Run zizmor to lint GitHub Actions workflows for security issues
        types: [yaml]
        files: ^\.github/workflows/.*$|^\.github/actions/.*$
        require_serial: true
        entry: zizmor
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: local
    hooks:
      # Guard against the Astro/JSX whitespace-collapse bug (#10, #29): a prose
      # text run immediately followed by an inline element on the next line loses
      # the space between them at render time. Fix with an explicit {" "} spacer
      # (see AGENTS.md § "Whitespace around inline elements in .astro / JSX").
      - id: astro-whitespace
        name: Check for Astro/JSX whitespace-collapse missing spaces
        entry: node scripts/check-astro-spaces.mjs
        language: system
        files: \.(astro|tsx|jsx)$
        pass_filenames: true
      # Keep the landing page's maintainer-education stream in sync with the
      # docs: every chapter under src/content/docs/education/ (except README,
      # and the training/ sub-module) must be linked from the landing hero.
      # Deterministic, stdlib-only Python — no network, no writes. Runs whenever
      # an education page or the hero changes (or on --all-files).
      - id: landing-education-sync
        name: Check every education chapter is linked on the landing page
        entry: python3 scripts/check-landing-education.py
        language: system
        pass_filenames: false
        files: ^(src/content/docs/education/.*\.md|src/components/landing/ImmersiveGradientHero\.tsx|scripts/check-landing-education\.py)$
      # Refresh the committer/PMC roster + GitHub avatars served by the landing
      # page (src/data/community.json + public/community-avatars/). Manual stage
      # only: it calls the GitHub API and writes binary avatars, so it is run on
      # demand rather than on every commit:
      #   prek run sync-community --hook-stage manual --all-files
      # Needs a GitHub token with read:org (GH_TOKEN / GITHUB_TOKEN env or
      # `gh auth login`); a run without a token is a graceful no-op.
      - id: sync-community
        name: Sync community roster + GitHub avatars
        entry: node scripts/sync-community.mjs
        language: system
        pass_filenames: false
        stages: [manual]
